name: bankak_flutter_final
description: Bankak PWA matched Flutter rebuild with Firebase and admin panel.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.0
  cloud_firestore: ^5.5.0
  firebase_auth: ^5.3.3
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  http: ^1.2.2
  mobile_scanner: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/img/app_icon.png"
